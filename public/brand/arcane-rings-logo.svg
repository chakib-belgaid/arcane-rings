<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 320" role="img" aria-labelledby="title desc">
  <title id="title">Arcane Rings logo</title>
  <desc id="desc">A moonlit concentric ring sigil beside the Arcane Rings wordmark.</desc>
  <defs>
    <radialGradient id="markGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#f7ead2" />
      <stop offset=".34" stop-color="#f2d89c" />
      <stop offset=".72" stop-color="#8fc9d6" stop-opacity=".55" />
      <stop offset="1" stop-color="#123e38" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ringGold" x1="65" y1="42" x2="264" y2="274">
      <stop offset="0" stop-color="#fff0bd" />
      <stop offset=".48" stop-color="#c39d58" />
      <stop offset="1" stop-color="#705327" />
    </linearGradient>
    <linearGradient id="ringTeal" x1="82" y1="232" x2="258" y2="58">
      <stop offset="0" stop-color="#27665c" />
      <stop offset=".52" stop-color="#8fc9d6" />
      <stop offset="1" stop-color="#f7ead2" />
    </linearGradient>
    <linearGradient id="wordGold" x1="308" y1="70" x2="770" y2="226">
      <stop offset="0" stop-color="#fff2c8" />
      <stop offset=".54" stop-color="#d7b46d" />
      <stop offset="1" stop-color="#8c682f" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#020807" flood-opacity=".7" />
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#8fc9d6" flood-opacity=".28" />
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="160" cy="160" r="126" fill="#071c16" stroke="url(#ringGold)" stroke-width="6" />
    <circle cx="160" cy="160" r="104" fill="url(#markGlow)" opacity=".2" />
    <circle cx="160" cy="160" r="88" fill="none" stroke="url(#ringTeal)" stroke-width="14" stroke-dasharray="126 22 42 22" stroke-linecap="round" />
    <circle cx="160" cy="160" r="58" fill="none" stroke="url(#ringGold)" stroke-width="12" stroke-dasharray="72 20" stroke-linecap="round" />
    <circle cx="160" cy="160" r="24" fill="#f2d89c" opacity=".9" />
    <path d="M198 78a58 58 0 1 0 43 92a72 72 0 1 1-43-92Z" fill="#f7ead2" opacity=".92" />
    <path d="M54 160h36M230 160h36M160 54v36M160 230v36" stroke="#f2d89c" stroke-width="5" stroke-linecap="round" opacity=".72" />
  </g>

  <g filter="url(#softShadow)">
    <path d="M314 96h442" stroke="#f2d89c" stroke-width="3" stroke-linecap="round" opacity=".62" />
    <path d="M314 236h442" stroke="#8fc9d6" stroke-width="3" stroke-linecap="round" opacity=".4" />
    <text x="310" y="166" fill="url(#wordGold)" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700">ARCANE</text>
    <text x="458" y="236" fill="#f7ead2" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="600">RINGS</text>
    <circle cx="416" cy="214" r="16" fill="none" stroke="#f2d89c" stroke-width="4" opacity=".88" />
    <circle cx="416" cy="214" r="6" fill="#8fc9d6" opacity=".88" />
  </g>
</svg>
